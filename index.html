<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="description" content="Shifster Solo — проследявай работни часове, заплата и цели." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shifster" />
  <title>Shifster Individual — Твоят Работен Пътник</title>

  <!-- SEO & Social Media -->
  <meta name="description" content="Проследявай работните си часове, заплата и цели с лекота и сигурност." />
  <meta property="og:title" content="Shifster Individual — Твоят Работен Пътник" />
  <meta property="og:description" content="Удачното проследяване на заплата и цели. Всичко в реално време, на едно място." />
  <meta property="og:image" content="icons/logo.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon.png" />
  <link rel="apple-touch-icon" href="icons/icon.png" />
  <link rel="stylesheet" href="style.css?v=7" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.6/dist/umd/supabase.js"></script>
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- SheetJS (Excel) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
</head>

<body class="dark-mode">

  <!-- ─── AUTH SCREEN ─── -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="icons/logo.png" class="logo-auth" alt="Shifster Logo">
        <p>Проследявай работното си време с прецизност</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-auth="login">Вход</button>
        <button class="auth-tab" data-auth="register">Регистрация</button>
      </div>

      <div id="authLogin" class="auth-form active">
        <div class="field-group">
          <label for="loginEmail">Имейл</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="loginPassword">Парола</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary btn-full" id="loginBtn">Влез в акаунта</button>
        <button class="btn btn-ghost btn-full" id="demoBtn">🎭 Демо режим (без регистрация)</button>
      </div>

      <div id="authRegister" class="auth-form">
        <div class="field-group">
          <label for="regName">Пълно име</label>
          <input type="text" id="regName" placeholder="Иван Иванов" />
        </div>
        <div class="field-group">
          <label for="regEmail">Имейл</label>
          <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="regPassword">Парола</label>
          <input type="password" id="regPassword" placeholder="минимум 6 символа" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary btn-full" id="registerBtn">Създай акаунт</button>
      </div>

      <div id="authMsg" class="auth-msg"></div>
      <div id="resendContainer" hidden style="text-align:center; margin-top:0.5rem">
        <button id="resendBtn" class="btn btn-ghost btn-sm">📩 Изпрати нов код</button>
      </div>
    </div>
  </div>

  <!-- ══ TOAST ══ -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ════ ONBOARDING ════ -->
  <div id="onboardingOverlay" class="onboarding-overlay" hidden>
    <div class="onboarding-card glass-card">
      <div id="onboardingStep1">
        <div class="onboarding-header">
          <h2>Добре дошъл! 👋</h2>
          <p>Кажи ни с какво се занимаваш, за да настроим Shifster за теб.</p>
        </div>
        <h3 class="onboarding-title">Избери твоята индустрия:</h3>
        <div class="onboarding-grid" id="industryGrid"></div>
      </div>

      <div id="onboardingStep2" hidden>
        <div class="onboarding-header">
          <h2>Твоята роля</h2>
          <p>Shifster ще създаде автоматични шаблони за твоята позиция.</p>
        </div>
        <div class="roles-container">
          <div id="rolesList" class="onboarding-roles"></div>
          <button class="btn btn-ghost btn-full" style="margin-top:1.5rem" onclick="onboardingBack()">⬅ Назад към индустриите</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js?v=7" defer></script>
</body>

</html>
