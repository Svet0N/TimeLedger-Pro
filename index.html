<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="description" content="TimeLedger Pro — проследявай работни часове, заплата и цели." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TimeLedger" />
  <title>TimeLedger Pro</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.6/dist/umd/supabase.js"></script>
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- SheetJS (Excel) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
</head>

<body class="dark-mode">

  <!-- ─── AUTH SCREEN ─── -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo-icon">⏱</span>
        <h1>TimeLedger <span class="logo-pro">Pro</span></h1>
        <p>Проследявай работното си време с прецизност</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-auth="login">Вход</button>
        <button class="auth-tab" data-auth="register">Регистрация</button>
      </div>

      <div id="authLogin" class="auth-form active">
        <div class="field-group">
          <label for="loginEmail">Имейл</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="loginPassword">Парола</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary btn-full" id="loginBtn">Влез в акаунта</button>
        <button class="btn btn-ghost btn-full" id="demoBtn">🎭 Демо режим (без регистрация)</button>
      </div>

      <div id="authRegister" class="auth-form">
        <div class="field-group">
          <label for="regName">Пълно име</label>
          <input type="text" id="regName" placeholder="Иван Иванов" />
        </div>
        <div class="field-group">
          <label for="regEmail">Имейл</label>
          <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="regPassword">Парола</label>
          <input type="password" id="regPassword" placeholder="минимум 6 символа" autocomplete="new-password" />
        </div>
        <div class="field-group">
          <label for="regRate">Часова ставка (лв./час)</label>
          <input type="number" id="regRate" value="11" min="1" max="9999" step="0.5" />
        </div>
        <button class="btn btn-primary btn-full" id="registerBtn">Създай акаунт</button>
      </div>

      <div id="authMsg" class="auth-msg"></div>
      <div id="resendContainer" hidden style="text-align:center; margin-top:0.5rem">
        <button id="resendBtn" class="btn btn-ghost btn-sm">📩 Изпрати нов код</button>
      </div>
    </div>
  </div>

  <!-- ══ TOAST ══ -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="script.js" defer></script>
</body>

</html>
